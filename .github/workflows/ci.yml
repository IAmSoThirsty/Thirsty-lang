name: Thirsty-Lang CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test

      - name: Run examples
        run: |
          node src/cli.js examples/hello.thirsty
          node src/cli.js examples/functions.thirsty
          node src/cli.js examples/arrays.thirsty
          node src/cli.js examples/classes.thirsty
          node src/cli.js examples/advanced/control-flow.tog
          node src/cli.js examples/advanced/functions.tarl
          node src/cli.js examples/advanced/classes.shadow

      - name: Run linter
        run: node src/linter.js examples/hello.thirsty || true

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Verify package
        run: npm pack --dry-run

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Thirsty-Lang-build
          path: |
            src/
            examples/
            docs/
            package.json
            README.md
