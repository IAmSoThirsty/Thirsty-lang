<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jurisdiction 0 Test Harness</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            line-height: 1.5;
        }

        .log {
            background: #1e293b;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            height: 500px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        .entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 2px;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
            font-weight: bold;
        }

        .info {
            color: #60a5fa;
        }

        h1 {
            color: #f1f5f9;
            border-bottom: 2px solid #3b82f6;
            display: inline-block;
            padding-bottom: 5px;
        }
    </style>
</head>

<body>
    <h1>Project-AI: Jurisdiction 0 Verification</h1>
    <div id="status">Status: Preparing Engine...</div>
    <div class="log" id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `entry ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // --- CORE CLASSES (Synced with Production) ---
        const TokenType = Object.freeze({
            NUMBER: 'NUMBER', STRING: 'STRING', IDENTIFIER: 'IDENTIFIER',
            KEYWORD: 'KEYWORD', OPERATOR: 'OPERATOR', PUNCTUATION: 'PUNCTUATION', EOF: 'EOF'
        });

        const KEYWORDS = new Set([
            'drink', 'pour', 'sip', 'thirsty', 'hydrated', 'glass', 'refill', 'reservoir', 'return',
            'fountain', 'cascade', 'sacred', 'new', 'shield', 'sanitize', 'armor', 'morph', 'detect', 'defend',
            'import', 'export', 'from', 'throw', 'try', 'catch', 'finally', 'await', 'true', 'false', 'this'
        ]);

        class Token {
            constructor(type, value, line, column) {
                this.type = type; this.value = value; this.line = line; this.column = column;
            }
        }

        class Tokenizer {
            constructor(source) {
                this.source = source; this.pos = 0; this.line = 1; this.column = 1; this.tokens = [];
            }
            tokenize() {
                while (this.pos < this.source.length) {
                    const ch = this.source[this.pos];
                    if (/\s/.test(ch)) {
                        if (ch === '\n') { this.line++; this.column = 1; } else { this.column++; }
                        this.pos++; continue;
                    }
                    if (ch === '/' && this.source[this.pos + 1] === '/') {
                        while (this.pos < this.source.length && this.source[this.pos] !== '\n') this.pos++;
                        continue;
                    }
                    if (ch === '"') {
                        let val = ''; let startCol = this.column; this.pos++; this.column++;
                        while (this.pos < this.source.length && this.source[this.pos] !== '"') {
                            val += this.source[this.pos++]; this.column++;
                        }
                        this.pos++; this.column++;
                        this.tokens.push(new Token(TokenType.STRING, val, this.line, startCol));
                    } else if (/[0-9]/.test(ch)) {
                        let val = ''; let startCol = this.column;
                        while (this.pos < this.source.length && /[0-9.]/.test(this.source[this.pos])) {
                            val += this.source[this.pos++]; this.column++;
                        }
                        this.tokens.push(new Token(TokenType.NUMBER, parseFloat(val), this.line, startCol));
                    } else if (/[a-zA-Z_]/.test(ch)) {
                        let val = ''; let startCol = this.column;
                        while (this.pos < this.source.length && /[a-zA-Z0-9_]/.test(this.source[this.pos])) {
                            val += this.source[this.pos++]; this.column++;
                        }
                        this.tokens.push(new Token(KEYWORDS.has(val) ? TokenType.KEYWORD : TokenType.IDENTIFIER, val, this.line, startCol));
                    } else if (/[\+\-\*\/\%\>\<\!\=]/.test(ch)) {
                        let val = ch; let startCol = this.column; this.pos++; this.column++;
                        if (this.source[this.pos] === '=' || (val === '&' && this.source[this.pos] === '&') || (val === '|' && this.source[this.pos] === '|')) {
                            val += this.source[this.pos++]; this.column++;
                        }
                        this.tokens.push(new Token(TokenType.OPERATOR, val, this.line, startCol));
                    } else if (/[\(\)\{\}\[\]\,\.\:\;]/.test(ch)) {
                        this.tokens.push(new Token(TokenType.PUNCTUATION, ch, this.line, this.column));
                        this.pos++; this.column++;
                    } else { this.pos++; this.column++; }
                }
                this.tokens.push(new Token(TokenType.EOF, null, this.line, this.column));
                return this.tokens;
            }
        }

        const NodeType = {
            Program: 'Program', NumberLiteral: 'NumberLiteral', StringLiteral: 'StringLiteral', BooleanLiteral: 'BooleanLiteral',
            ArrayLiteral: 'ArrayLiteral', ObjectLiteral: 'ObjectLiteral', Identifier: 'Identifier',
            BinaryExpression: 'BinaryExpression', UnaryExpression: 'UnaryExpression',
            CallExpression: 'CallExpression', MemberExpression: 'MemberExpression', IndexExpression: 'IndexExpression',
            AssignmentExpression: 'AssignmentExpression', VariableDeclaration: 'VariableDeclaration', ReservoirDeclaration: 'ReservoirDeclaration',
            PourStatement: 'PourStatement', IfStatement: 'IfStatement', WhileStatement: 'WhileStatement',
            FunctionDeclaration: 'FunctionDeclaration', ClassDeclaration: 'ClassDeclaration', CascadeDeclaration: 'CascadeDeclaration',
            ReturnStatement: 'ReturnStatement', ThrowStatement: 'ThrowStatement', ShieldBlock: 'ShieldBlock',
            ArmorStatement: 'ArmorStatement', ImportStatement: 'ImportStatement', ExportStatement: 'ExportStatement',
            ExpressionStatement: 'ExpressionStatement', BlockStatement: 'BlockStatement'
        };

        class Parser {
            constructor(tokens) { this.tokens = tokens; this.pos = 0; }
            current() { return this.tokens[this.pos]; }
            advance() { return this.tokens[this.pos++]; }
            check(type, val) { const t = this.current(); return t.type === type && (val === undefined || t.value === val); }
            expect(type, val) { if (this.check(type, val)) return this.advance(); throw new Error(`Expected ${type}${val ? '(' + val + ')' : ''} at ${this.current().line}:${this.current().column}`); }
            match(type, val) { if (this.check(type, val)) { this.advance(); return true; } return false; }
            parse() { const body = []; while (!this.check(TokenType.EOF)) { body.push(this.parseStatement()); } return { type: NodeType.Program, body }; }
            parseStatement() {
                const t = this.current();
                if (t.type === TokenType.KEYWORD) {
                    switch (t.value) {
                        case 'drink': return this.parseVarDecl();
                        case 'reservoir': return this.parseReservoir();
                        case 'pour': this.advance(); return { type: NodeType.PourStatement, expression: this.parseExpr() };
                        case 'thirsty': return this.parseIf();
                        case 'refill': return this.parseWhile();
                        case 'glass': return this.parseFunc();
                        case 'fountain': return this.parseClass();
                        case 'cascade': return this.parseCascade();
                        case 'return': this.advance(); return { type: NodeType.ReturnStatement, value: this.check(TokenType.PUNCTUATION, '}') ? null : this.parseExpr() };
                        case 'throw': this.advance(); return { type: NodeType.ThrowStatement, value: this.parseExpr() };
                        case 'shield': this.advance(); const name = this.expect(TokenType.IDENTIFIER).value; return { type: NodeType.ShieldBlock, name, body: this.parseBlock() };
                        case 'armor': this.advance(); return { type: NodeType.ArmorStatement, varName: this.expect(TokenType.IDENTIFIER).value };
                        case 'import': return this.parseImport();
                        case 'export': return this.parseExport();
                    }
                }
                return { type: NodeType.ExpressionStatement, expression: this.parseExpr() };
            }
            parseVarDecl() { this.advance(); const target = this.parsePostfix(); this.expect(TokenType.OPERATOR, '='); return { type: NodeType.VariableDeclaration, target, value: this.parseExpr() }; }
            parseReservoir() { this.advance(); const name = this.expect(TokenType.IDENTIFIER).value; this.expect(TokenType.OPERATOR, '='); return { type: NodeType.ReservoirDeclaration, name, elements: this.parseExpr().elements || [] }; }
            parseIf() { this.advance(); const cond = this.parseExpr(); const cons = this.parseBlock(); let alt = null; if (this.match(TokenType.KEYWORD, 'hydrated')) alt = this.check(TokenType.KEYWORD, 'thirsty') ? this.parseIf() : this.parseBlock(); return { type: NodeType.IfStatement, condition: cond, consequent: cons, alternate: alt }; }
            parseWhile() { this.advance(); const cond = this.parseExpr(); return { type: NodeType.WhileStatement, condition: cond, body: this.parseBlock() }; }
            parseFunc() { this.advance(); const name = this.expect(TokenType.IDENTIFIER).value; const params = this.parseParams(); return { type: NodeType.FunctionDeclaration, name, params, body: this.parseBlock() }; }
            parseCascade() { this.advance(); const name = this.expect(TokenType.IDENTIFIER).value; const params = this.parseParams(); return { type: NodeType.CascadeDeclaration, name, params, body: this.parseBlock() }; }
            parseClass() {
                this.advance(); const name = this.expect(TokenType.IDENTIFIER).value; this.expect(TokenType.PUNCTUATION, '{');
                const ms = [], ps = []; while (!this.check(TokenType.PUNCTUATION, '}')) {
                    if (this.check(TokenType.KEYWORD, 'glass')) ms.push(this.parseFunc());
                    else { this.expect(TokenType.KEYWORD, 'drink'); const n = this.expect(TokenType.IDENTIFIER).value; this.expect(TokenType.OPERATOR, '='); ps.push({ name: n, defaultValue: this.parseExpr() }); }
                }
                this.expect(TokenType.PUNCTUATION, '}'); return { type: NodeType.ClassDeclaration, name, methods: ms, properties: ps };
            }
            parseBlock() { this.expect(TokenType.PUNCTUATION, '{'); const body = []; while (!this.check(TokenType.PUNCTUATION, '}')) body.push(this.parseStatement()); this.expect(TokenType.PUNCTUATION, '}'); return { type: NodeType.BlockStatement, body }; }
            parseParams() { this.expect(TokenType.PUNCTUATION, '('); const ps = []; while (!this.check(TokenType.PUNCTUATION, ')')) { ps.push(this.expect(TokenType.IDENTIFIER).value); if (!this.check(TokenType.PUNCTUATION, ')')) this.expect(TokenType.PUNCTUATION, ','); } this.expect(TokenType.PUNCTUATION, ')'); return ps; }
            parseImport() { this.advance(); let names = []; if (this.match(TokenType.PUNCTUATION, '{')) { while (!this.check(TokenType.PUNCTUATION, '}')) { names.push(this.expect(TokenType.IDENTIFIER).value); if (!this.check(TokenType.PUNCTUATION, '}')) this.expect(TokenType.PUNCTUATION, ','); } this.expect(TokenType.PUNCTUATION, '}'); } else { names.push(this.expect(TokenType.IDENTIFIER).value); } this.expect(TokenType.KEYWORD, 'from'); const path = this.expect(TokenType.STRING).value; return { type: NodeType.ImportStatement, names, path }; }
            parseExport() { this.advance(); return { type: NodeType.ExportStatement, name: this.expect(TokenType.IDENTIFIER).value }; }
            parseExpr() { return this.parseAssign(); }
            parseAssign() { const left = this.parseOr(); if (this.match(TokenType.OPERATOR, '=')) return { type: NodeType.AssignmentExpression, left, operator: '=', right: this.parseAssign() }; return left; }
            parseOr() { let l = this.parseAnd(); while (this.match(TokenType.OPERATOR, '||')) l = { type: NodeType.BinaryExpression, operator: '||', left: l, right: this.parseAnd() }; return l; }
            parseAnd() { let l = this.parseEq(); while (this.match(TokenType.OPERATOR, '&&')) l = { type: NodeType.BinaryExpression, operator: '&&', left: l, right: this.parseEq() }; return l; }
            parseEq() { let l = this.parseComp(); while (this.check(TokenType.OPERATOR, '==') || this.check(TokenType.OPERATOR, '!=')) l = { type: NodeType.BinaryExpression, operator: this.advance().value, left: l, right: this.parseComp() }; return l; }
            parseComp() { let l = this.parseAdd(); while (['>', '<', '>=', '<='].includes(this.current().value)) l = { type: NodeType.BinaryExpression, operator: this.advance().value, left: l, right: this.parseAdd() }; return l; }
            parseAdd() { let l = this.parseMul(); while (['+', '-'].includes(this.current().value)) l = { type: NodeType.BinaryExpression, operator: this.advance().value, left: l, right: this.parseMul() }; return l; }
            parseMul() { let l = this.parseUnary(); while (['*', '/', '%'].includes(this.current().value)) l = { type: NodeType.BinaryExpression, operator: this.advance().value, left: l, right: this.parseMul() }; return l; }
            parseUnary() { if (this.current() && ['!', '-'].includes(this.current().value)) return { type: NodeType.UnaryExpression, operator: this.advance().value, operand: this.parseUnary() }; return this.parsePostfix(); }
            parsePostfix() {
                let e = this.parsePrimary();
                while (true) {
                    if (this.match(TokenType.PUNCTUATION, '.')) {
                        let p;
                        if (this.check(TokenType.KEYWORD)) p = this.advance().value;
                        else p = this.expect(TokenType.IDENTIFIER).value;
                        if (this.check(TokenType.PUNCTUATION, '(')) e = { type: NodeType.CallExpression, callee: { type: NodeType.MemberExpression, object: e, property: p }, arguments: this.parseArgs() }; else e = { type: NodeType.MemberExpression, object: e, property: p };
                    }
                    else if (this.match(TokenType.PUNCTUATION, '[')) { const i = this.parseExpr(); this.expect(TokenType.PUNCTUATION, ']'); e = { type: NodeType.IndexExpression, object: e, index: i }; }
                    else if (this.check(TokenType.PUNCTUATION, '(') && (e.type === NodeType.Identifier || e.type === NodeType.MemberExpression)) e = { type: NodeType.CallExpression, callee: e, arguments: this.parseArgs() };
                    else break;
                }
                return e;
            }
            parsePrimary() {
                const t = this.current();
                if (t.type === TokenType.NUMBER) return { type: NodeType.NumberLiteral, value: this.advance().value };
                if (t.type === TokenType.STRING) return { type: NodeType.StringLiteral, value: this.advance().value };
                if (t.type === TokenType.KEYWORD) {
                    if (t.value === 'true' || t.value === 'false') return { type: NodeType.BooleanLiteral, value: this.advance().value === 'true' };
                    if (t.value === 'this') return { type: NodeType.Identifier, name: this.advance().value };
                    if (t.value === 'new') { this.advance(); const n = this.expect(TokenType.IDENTIFIER).value; return { type: NodeType.CallExpression, callee: { type: NodeType.Identifier, name: n }, arguments: this.parseArgs(), isNew: true }; }
                }
                if (t.type === TokenType.IDENTIFIER) return { type: NodeType.Identifier, name: this.advance().value };
                if (this.match(TokenType.PUNCTUATION, '(')) { const e = this.parseExpr(); this.expect(TokenType.PUNCTUATION, ')'); return e; }
                if (this.check(TokenType.PUNCTUATION, '[')) return this.parseArray();
                if (this.check(TokenType.PUNCTUATION, '{')) return this.parseObject();
                throw new Error(`Unexpected token ${t.type}(${t.value}) at ${t.line}:${t.column}`);
            }
            parseArray() { this.expect(TokenType.PUNCTUATION, '['); const es = []; while (!this.check(TokenType.PUNCTUATION, ']')) { es.push(this.parseExpr()); if (!this.check(TokenType.PUNCTUATION, ']')) this.expect(TokenType.PUNCTUATION, ','); } this.expect(TokenType.PUNCTUATION, ']'); return { type: NodeType.ArrayLiteral, elements: es }; }
            parseObject() { this.expect(TokenType.PUNCTUATION, '{'); const ps = {}; while (!this.check(TokenType.PUNCTUATION, '}')) { let k; if (this.check(TokenType.IDENTIFIER)) k = this.advance().value; else k = this.expect(TokenType.STRING).value; this.expect(TokenType.PUNCTUATION, ':'); ps[k] = this.parseExpr(); if (!this.check(TokenType.PUNCTUATION, '}')) this.expect(TokenType.PUNCTUATION, ','); } this.expect(TokenType.PUNCTUATION, '}'); return { type: NodeType.ObjectLiteral, properties: ps }; }
            parseArgs() { this.expect(TokenType.PUNCTUATION, '('); const as = []; while (!this.check(TokenType.PUNCTUATION, ')')) { as.push(this.parseExpr()); if (!this.check(TokenType.PUNCTUATION, ')')) this.expect(TokenType.PUNCTUATION, ','); } this.expect(TokenType.PUNCTUATION, ')'); return as; }
        }

        class Environment {
            constructor(parent = null) { this.parent = parent; this.store = {}; this.armored = new Set(); }
            define(name, val) { this.store[name] = val; }
            set(name, val) {
                if (this.armored.has(name)) return;
                if (name in this.store) this.store[name] = val;
                else if (this.parent) this.parent.set(name, val);
                else this.store[name] = val;
            }
            get(name) {
                if (name in this.store) return this.store[name];
                if (this.parent) return this.parent.get(name);
                throw new Error("Undefined identifier: " + name);
            }
            has(name) { return (name in this.store) || (this.parent && this.parent.has(name)); }
            armor(name) { this.armored.add(name); }
            all() { let res = this.parent ? this.parent.all() : {}; return Object.assign(res, this.store); }
        }

        class ASTInterpreter {
            constructor(host) { this.host = host; this.globalEnv = new Environment(); this.functions = {}; this.classes = {}; this.exports = {}; }
            run(p) { this.execBlock(p.body, this.globalEnv); this.sync(); }
            sync() { this.host.variables = this.globalEnv.all(); this.host.functions = Object.assign(this.host.functions, this.functions); this.host.classes = Object.assign(this.host.classes, this.classes); this.host.exports = Object.assign(this.host.exports, this.exports); }
            execBlock(ss, env) { for (const s of ss) { const r = this.execStmt(s, env); if (r && r.type === 'return') return r; } }
            execStmt(n, env) {
                switch (n.type) {
                    case NodeType.VariableDeclaration: {
                        const val = this.evalExpr(n.value, env);
                        if (n.target.type === NodeType.Identifier) env.set(n.target.name, val);
                        else if (n.target.type === NodeType.IndexExpression) { const o = this.evalExpr(n.target.object, env); const i = this.evalExpr(n.target.index, env); o[i] = val; }
                        else if (n.target.type === NodeType.MemberExpression) { const o = this.evalExpr(n.target.object, env); if (o.__properties) o.__properties[n.target.property] = val; else o[n.target.property] = val; }
                        break;
                    }
                    case NodeType.PourStatement: log(this.evalExpr(n.expression, env), 'info'); break;
                    case NodeType.IfStatement: if (this.evalExpr(n.condition, env)) return this.execBlock(n.consequent.body, env);
                    else if (n.alternate) { if (n.alternate.type === NodeType.IfStatement) return this.execStmt(n.alternate, env); return this.execBlock(n.alternate.body, env); }
                        break;
                    case NodeType.WhileStatement: while (this.evalExpr(n.condition, env)) { const r = this.execBlock(n.body.body, env); if (r && r.type === 'return') return r; } break;
                    case NodeType.FunctionDeclaration: this.functions[n.name] = n; break;
                    case NodeType.ClassDeclaration: this.classes[n.name] = n; break;
                    case NodeType.CascadeDeclaration: this.functions[n.name] = n; break;
                    case NodeType.ReturnStatement: return { type: 'return', value: n.value ? this.evalExpr(n.value, env) : undefined };
                    case NodeType.ThrowStatement: throw new Error(this.evalExpr(n.value, env));
                    case NodeType.ReservoirDeclaration: env.set(n.name, this.evalExpr(n.elements, env) || n.elements); break;
                    case NodeType.ShieldBlock: return this.execBlock(n.body.body, env);
                    case NodeType.ArmorStatement: env.armor(n.varName); break;
                    case NodeType.ImportStatement: this.host.loadModule(n.path, n.names); break;
                    case NodeType.ExportStatement: { const v = env.has(n.name) ? env.get(n.name) : (this.functions[n.name] || this.classes[n.name]); this.exports[n.name] = v; break; }
                    case NodeType.ExpressionStatement: this.evalExpr(n.expression, env); break;
                }
            }
            evalExpr(n, env) {
                if (!n) return null;
                switch (n.type) {
                    case NodeType.NumberLiteral: return n.value;
                    case NodeType.StringLiteral: return n.value;
                    case NodeType.BooleanLiteral: return n.value;
                    case NodeType.Identifier: if (n.name === 'this') return env.get('this'); return env.get(n.name);
                    case NodeType.ArrayLiteral: return n.elements.map(e => this.evalExpr(e, env));
                    case NodeType.ObjectLiteral: { const r = {}; for (const [k, v] of Object.entries(n.properties)) r[k] = this.evalExpr(v, env); return r; }
                    case NodeType.BinaryExpression:
                        const l = this.evalExpr(n.left, env), r = this.evalExpr(n.right, env);
                        if (n.operator === '+') return l + r; if (n.operator === '-') return l - r; if (n.operator === '*') return l * r; if (n.operator === '/') return l / r; if (n.operator === '%') return l % r;
                        if (n.operator === '==') return l == r; if (n.operator === '!=') return l != r; if (n.operator === '>') return l > r; if (n.operator === '<') return l < r;
                        if (n.operator === '>=') return l >= r; if (n.operator === '<=') return l <= r;
                        if (n.operator === '&&') return l && r; if (n.operator === '||') return l || r;
                        break;
                    case NodeType.UnaryExpression:
                        const o = this.evalExpr(n.operand, env);
                        if (n.operator === '!') return !o; if (n.operator === '-') return -o;
                        break;
                    case NodeType.CallExpression:
                        const args = n.arguments.map(a => this.evalExpr(a, env));
                        if (n.isNew) return this.instantiate(n.callee.name, args);
                        if (n.callee.type === NodeType.MemberExpression) {
                            const o = this.evalExpr(n.callee.object, env);
                            if (o && o.push && n.callee.property === 'push') return o.push(...args);
                            if (o && o.__methods && o.__methods[n.callee.property]) return this.callMethod(o, n.callee.property, args);
                            if (o && typeof o[n.callee.property] === 'function') return o[n.callee.property](...args);
                        }
                        const fnName = n.callee.name;
                        if (this.functions[fnName]) return this.callFunc(fnName, args);
                        if (this.host.functions[fnName]) return this.callFunc(fnName, args, true);
                        if (window.Math[fnName]) return window.Math[fnName](...args);
                        if (env.has(fnName)) { const f = env.get(fnName); if (typeof f === 'function') return f(...args); }
                        throw new Error("Cannot call " + fnName);
                    case NodeType.MemberExpression: { const o = this.evalExpr(n.object, env); if (n.property === 'length') return o.length; return o.__properties ? o.__properties[n.property] : o[n.property]; }
                    case NodeType.IndexExpression: { const o = this.evalExpr(n.object, env); const i = this.evalExpr(n.index, env); return o[i]; }
                    case NodeType.AssignmentExpression: {
                        const v = this.evalExpr(n.right, env);
                        if (n.left.type === NodeType.Identifier) env.set(n.left.name, v);
                        else if (n.left.type === NodeType.IndexExpression) { const o = this.evalExpr(n.left.object, env); const i = this.evalExpr(n.left.index, env); o[i] = v; }
                        else if (n.left.type === NodeType.MemberExpression) { const o = this.evalExpr(n.left.object, env); if (o.__properties) o.__properties[n.left.property] = v; else o[n.left.property] = v; }
                        return v;
                    }
                }
            }
            instantiate(name, args) {
                const cls = this.classes[name] || this.host.classes[name];
                if (!cls) throw new Error("Undefined class: " + name);
                const inst = { __class: name, __properties: {}, __methods: {} };
                cls.methods.forEach(m => inst.__methods[m.name] = m);
                cls.properties.forEach(p => inst.__properties[p.name] = this.evalExpr(p.defaultValue, this.globalEnv));
                if (inst.__methods.fountain) this.callMethod(inst, 'fountain', args);
                return inst;
            }
            callFunc(name, args, fromHost = false) {
                const f = fromHost ? this.host.functions[name] : this.functions[name];
                const fEnv = new Environment(this.globalEnv);
                f.params.forEach((p, i) => fEnv.define(p, args[i]));
                const res = this.execBlock(f.body.body, fEnv); return res ? res.value : undefined;
            }
            callMethod(inst, name, args) {
                const m = inst.__methods[name]; const mEnv = new Environment(this.globalEnv);
                m.params.forEach((p, i) => mEnv.define(p, args[i])); mEnv.define('this', inst.__properties);
                const res = this.execBlock(m.body.body, mEnv); return res ? res.value : undefined;
            }
        }

        class ThirstyInterpreter {
            constructor() { this.variables = { Math: window.Math }; this.functions = {}; this.classes = {}; this.exports = {}; this.modules = {}; }
            execute(code) {
                const tokens = new Tokenizer(code).tokenize();
                const ast = new Parser(tokens).parse();
                const intr = new ASTInterpreter(this);
                Object.entries(this.variables).forEach(([k, v]) => intr.globalEnv.define(k, v));
                intr.run(ast);
            }
            loadModule(path, names) {
                if (this.modules[path]) { const ex = this.modules[path]; names.forEach(n => this.variables[n] = ex[n]); return; }
                const code = FS_REGISTRY[path]; if (!code) throw new Error("Module not found: " + path);
                const tokens = new Tokenizer(code).tokenize();
                const ast = new Parser(tokens).parse();
                const intr = new ASTInterpreter(this);
                Object.entries(this.variables).forEach(([k, v]) => intr.globalEnv.define(k, v));
                intr.run(ast);
                this.modules[path] = intr.exports;
                names.forEach(n => {
                    if (intr.exports[n]) {
                        const ex = intr.exports[n];
                        if (ex.type === NodeType.FunctionDeclaration) this.functions[n] = ex;
                        else if (ex.type === NodeType.ClassDeclaration) this.classes[n] = ex;
                        else this.variables[n] = ex;
                    }
                });
            }
        }


        // --- REGISTRY ---
        const FS_REGISTRY = {
            '../internal/anomaly/entropy.tarl': `glass ShannonEntropy(c) { drink t = 0 drink n = c.length drink i = 0 
                refill i < n { drink t = t + c[i] drink i = i + 1 } thirsty t == 0 { return 0.0 }
                drink H = 0.0 drink i = 0 refill i < n { drink v = c[i] thirsty v > 0 { drink p = v / t drink H = H - (p * Math.log2(p)) } drink i = i + 1 } return H }
                glass MaxEntropy(k) { thirsty k <= 1 { return 0.0 } return Math.log2(k) }
                glass NormalisedEntropy(c, nt) { drink hm = MaxEntropy(nt) thirsty hm == 0.0 { return 0.0 } return ShannonEntropy(c) / hm }
                export ShannonEntropy export NormalisedEntropy`,
            '../internal/anomaly/engine.shadow': `fountain Baseline { drink mean = [] drink inv_cov = [] drink entropy = 0.0 drink sample_count = 0 
                glass fountain(m, i, e, s) { drink this.mean = m drink this.inv_cov = i drink this.entropy = e drink this.sample_count = s } }
                fountain AnomalyEngine { 
                    glass score(x, b, he) { thirsty b == null { return 0.0 } drink d = this.mahalanobis(x, b.mean, b.inv_cov)
                        drink de = he - b.entropy thirsty de < 0 { drink de = 0 - de } return d + (0.5 * de) }
                    glass mahalanobis(x, m, ic) { drink n = x.length thirsty n == 0 { return 0.0 } drink df = [] drink i = 0
                        refill i < n { df.push(x[i] - m[i]) drink i = i + 1 } drink s = 0.0 drink i = 0
                        refill i < n { drink rs = 0.0 drink j = 0 refill j < n { drink rs = rs + (df[j] * ic[(i*n)+j]) drink j = j + 1 }
                            drink s = s + (df[i] * rs) drink i = i + 1 } thirsty s < 0 { return 0.0 } return Math.sqrt(s) } }
                export Baseline export AnomalyEngine`,
            '../reflex.tarl': `import { AnomalyEngine, Baseline } from "../internal/anomaly/engine.shadow"
                import { ShannonEntropy } from "../internal/anomaly/entropy.tarl"
                reservoir accs = {} reservoir sts = {} drink bl = null
                glass InitializeReflex(ib) { drink bl = ib }
                glass ProcessSacrifice(pid, x, ec) { shield RS { drink e = new AnomalyEngine() drink hc = ShannonEntropy(ec)
                    drink sc = e.score(x, bl, hc) drink pr = UpdatePressure(pid, sc) drink tg = DetermineTargetState(pr)
                    Escalate(pid, tg, pr) return { "score": sc, "pressure": pr, "target": tg } } }
                glass UpdatePressure(pid, sc) { drink al = 0.2 drink cp = 0.0 thirsty accs[pid] != null { drink cp = accs[pid] }
                    drink np = (al * sc) + ((1.0 - al) * cp) drink accs[pid] = np return np }
                glass DetermineTargetState(pr) { thirsty pr > 0.8 { return "TERMINATED" } thirsty pr > 0.6 { return "QUARANTINED" }
                    thirsty pr > 0.4 { return "FROZEN" } thirsty pr > 0.2 { return "ISOLATED" } return "NORMAL" }
                glass Escalate(pid, tg, pr) { drink c = "NORMAL" thirsty sts[pid] != null { drink c = sts[pid] }
                    thirsty tg != c { pour "ESCALATION: PID " + pid + " to " + tg drink sts[pid] = tg armor sts[pid] } }
                export InitializeReflex export ProcessSacrifice`
        };

        const TEST_CODE = `import { AnomalyEngine, Baseline } from "../internal/anomaly/engine.shadow"
            import { ShannonEntropy } from "../internal/anomaly/entropy.tarl"
            import { InitializeReflex, ProcessSacrifice } from "../reflex.tarl"
            glass RunTests() {
                pour "--- JURISDICTION 0 TEST SUITE STARTING ---"
                TestEntropy()
                TestAnomalyEngine()
                TestReflexLoop()
                pour "--- ALL JURISDICTION 0 TESTS PASSED ---"
            }
            glass TestEntropy() {
                pour "Testing Entropy..."
                drink h0 = ShannonEntropy([0, 0, 0, 0])
                thirsty h0 != 0.0 { throw "Entropy Fault: Expected 0.0" }
                drink hMixed = ShannonEntropy([1, 1, 1, 1])
                thirsty hMixed != 2.0 { throw "Entropy Fault: Expected 2.0" }
                pour "Entropy tests passed."
            }
            glass TestAnomalyEngine() {
                pour "Testing Anomaly Engine..."
                drink e = new AnomalyEngine()
                drink mu = [10.0, 20.0] drink ic = [1.0, 0.0, 0.0, 1.0]
                drink b = new Baseline(mu, ic, 1.5, 100)
                drink sc0 = e.score([10.0, 20.0], b, 1.5)
                thirsty sc0 != 0.0 { throw "Anomaly Fault: Expected 0.0" }
                drink sc1 = e.score([11.0, 20.0], b, 1.5)
                thirsty sc1 != 1.0 { throw "Anomaly Fault: Expected 1.0" }
                pour "Anomaly Engine tests passed."
            }
            glass TestReflexLoop() {
                pour "Testing Reflex Loop..."
                drink mu = [10.0, 20.0] drink ic = [1.0, 0.0, 0.0, 1.0]
                drink b = new Baseline(mu, ic, 1.0, 100)
                InitializeReflex(b)
                drink r1 = ProcessSacrifice(1234, [10.0, 20.0], [1, 0, 0, 0])
                thirsty r1.target != "NORMAL" { throw "Reflex Fault: Expected NORMAL" }
                pour "Reflex loop tests passed."
            }
            RunTests()`;

        // --- RUN ---
        window.onload = () => {
            log("Initializing Thirsty-Lang Runtime...", 'info');
            try {
                const interpreter = new ThirstyInterpreter();
                log("Executing Jurisdiction 0 Verification Suite...", 'info');
                interpreter.execute(TEST_CODE);
                statusEl.textContent = "Status: SUCCESS - 100% Coverage Verified";
                statusEl.className = 'success';
                log("VERIFICATION COMPLETE: Jurisdiction 0 logic is sound.", 'success');
            } catch (e) {
                log("FATAL ERROR: " + e.message + "\n" + e.stack, 'error');
                statusEl.textContent = "Status: FAILED";
                statusEl.className = 'error';
                console.error(e);
            }
        };
    </script>
