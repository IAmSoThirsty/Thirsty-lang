<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Mobile Playground | Thirsty-Lang</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 40px;
            border: 8px solid #334155;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #334155;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: rgba(0, 242, 254, 0.2);
            color: var(--primary);
            border: 1px solid var(--primary);
            margin-bottom: 10px;
        }

        .btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            padding: 15px;
            border-radius: 15px;
            color: #000;
            font-weight: 700;
            width: 100%;
            margin-top: auto;
            cursor: pointer;
        }

        .output-console {
            background: #000;
            border-radius: 10px;
            padding: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #4ade80;
            height: 100px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="header">
                <div class="status-badge">PRIME RUNTIME</div>
                <div class="title">Sovereign Mobile</div>
            </div>

            <div class="card">
                <h3>Thirsty-Lang Node</h3>
                <p>Status: Active</p>
                <div class="output-console" id="console">
                    > System Boot Complete...<br>
                    > Environment: Sovereign-Native<br>
                    > Readiness: God-Tier
                </div>
            </div>

            <div class="card">
                <h3>Active Shielding</h3>
                <p>Cerberus-Hydra V4</p>
            </div>

            <button class="btn" onclick="pulse()">INITIATE CONTINUITY PULSE</button>
        </div>
    </div>

    <script>
        function pulse() {
            const consoleEl = document.getElementById('console');
            const log = document.createElement('div');
            log.textContent = `> [${new Date().toLocaleTimeString()}] Pulse Detected...`;
            consoleEl.appendChild(log);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
    </script>
</body>
</html>
